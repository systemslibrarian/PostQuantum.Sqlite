name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PostQuantum.Sqlite.sln

      - name: Build
        run: dotnet build PostQuantum.Sqlite.sln -c Release --no-restore

      - name: Test
        run: dotnet test PostQuantum.Sqlite.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/*.trx

      - name: Pack (Linux only, no publish)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack src/PostQuantum.Sqlite/PostQuantum.Sqlite.csproj -c Release --no-build --output artifacts

      - name: Upload NuGet artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
