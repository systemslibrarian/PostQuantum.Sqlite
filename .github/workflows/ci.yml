name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt the runner into Node.js 24 ahead of the 2026-06-16 default flip
  # so we are not surprised by a transparent runtime change.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  # ML-KEM/ML-DSA in the .NET 10 BCL delegate to libssl; FIPS 203/204
  # support landed in OpenSSL 3.5. Ubuntu 24.04 ships 3.0.x, so we build
  # 3.5 from source and put it on LD_LIBRARY_PATH for the test step.
  OPENSSL_VERSION: "3.5.0"
  OPENSSL_PREFIX: /opt/openssl-3.5

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is intentionally excluded. .NET 10's macOS build delegates
        # System.Security.Cryptography to Apple's Security framework rather
        # than OpenSSL; Security framework does not yet implement ML-KEM /
        # ML-DSA (FIPS 203 / 204), so MLKem.IsSupported returns false on
        # Darwin regardless of which OpenSSL is installed. README's
        # "Platform support" section tracks the blocker.
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache OpenSSL 3.5 (Linux)
        if: runner.os == 'Linux'
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_PREFIX }}
          key: openssl-${{ env.OPENSSL_VERSION }}-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Build OpenSSL ${{ env.OPENSSL_VERSION }} from source (Linux, cache miss)
        if: runner.os == 'Linux' && steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential perl
          cd /tmp
          curl -fsSL -o openssl.tar.gz "https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz"
          tar xzf openssl.tar.gz
          cd "openssl-${OPENSSL_VERSION}"
          # -Wl,-rpath bakes the install lib path into the openssl binary so
          # it self-resolves to its own libs instead of the system 3.0.x ones.
          ./Configure \
            --prefix="${OPENSSL_PREFIX}" \
            --openssldir="${OPENSSL_PREFIX}" \
            shared no-tests no-docs \
            -Wl,-rpath,"${OPENSSL_PREFIX}/lib64"
          make -j"$(nproc)"
          sudo make install_sw
          LD_LIBRARY_PATH="${OPENSSL_PREFIX}/lib64" "${OPENSSL_PREFIX}/bin/openssl" version

      - name: Export library paths for .NET (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "LD_LIBRARY_PATH=${OPENSSL_PREFIX}/lib64:${OPENSSL_PREFIX}/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore PostQuantum.SqlCipher.Vault.sln

      - name: Audit NuGet packages for known vulnerabilities
        # Linux-only gate to avoid duplicate noise across three platforms.
        # Includes transitive deps, so a CVE deep in the closure (e.g.
        # SQLitePCLRaw, Microsoft.Data.Sqlite) fails the build the next time
        # CI runs after a GHSA publishes.
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          out=$(dotnet list PostQuantum.SqlCipher.Vault.sln package --vulnerable --include-transitive 2>&1)
          echo "$out"
          if echo "$out" | grep -E "^\s+>\s+\S+\s+\S+\s+\S+\s+\S+\s+https?://" >/dev/null; then
            echo "::error::Vulnerable NuGet packages reported above. Fail the build."
            exit 1
          fi

      - name: Build
        run: dotnet build PostQuantum.SqlCipher.Vault.sln -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test PostQuantum.SqlCipher.Vault.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/*.trx

      - name: Pack (Linux only, no publish)
        if: runner.os == 'Linux'
        run: dotnet pack src/PostQuantum.SqlCipher.Vault/PostQuantum.SqlCipher.Vault.csproj -c Release --no-build -p:ContinuousIntegrationBuild=true --output artifacts

      - name: Upload NuGet artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/*.nupkg
